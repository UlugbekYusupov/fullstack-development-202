<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light</title>
    <link rel="stylesheet" href="index4.css">
</head>
<body>
<div class="page">
    <div class="traffic-light">
        <div class="lamp red" data-color="red"></div>
        <div class="lamp yellow" data-color="yellow"></div>
        <div class="lamp green" data-color="green"></div>
    </div>
    <div class="timer" id="timer">Timer: 0s</div>
    <div class="controls">
        <button id="start">Turn On</button>
        <button id="stop">Turn Off</button>
    </div>
</div>
<script src="main11.js"></script>
</body>
</html>
