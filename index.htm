<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login / Register</title>
  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <div class="container">
    <div class="top-buttons">
      <button class="tab-btn active" id="loginTab" type="button">Login</button>
      <button class="tab-btn" id="registerTab" type="button">Register</button>
    </div>

    <div class="form-box">
      <h2 class="title" id="formTitle">Login</h2>

      <form id="authForm">
        <div class="input-group hidden" id="usernameGroup">
          <label for="username">Login</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Login kiriting"
            minlength="3"
          />
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Kamida 8 ta belgi"
            minlength="8"
            required
          />
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Login</button>
        <p class="message" id="message"></p>
      </form>
    </div>
  </div>

  <script src="./auth.js"></script>
</body>
</html>
