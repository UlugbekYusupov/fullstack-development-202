<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Interactive To-Do List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Interactive To-Do List</h1>

<div id="taskList"></div>

<button id="addTaskBtn" class="addBtn">Add Task</button>

</div>


<div id="modal" class="modal">

<div class="modalBox">

<h2>Add Task</h2>

<input id="title" type="text" placeholder="Task Title">

<textarea id="desc" placeholder="Task Description"></textarea>

<select id="status">
<option value="pending">Pending</option>
<option value="progress">In Progress</option>
<option value="completed">Completed</option>
</select>

<button id="saveBtn" class="saveBtn">Save Task</button>
<button id="closeBtn" class="closeBtn">Close</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
