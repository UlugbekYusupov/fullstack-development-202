<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sign Up Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div id="signupForm" class="form">

<h2>Sign Up</h2>

<input
type="text"
placeholder="Username">

<input
type="email"
placeholder="Email">

<input
type="password"
placeholder="Password">

<button>Submit</button>


<p>

Already have an account?

<span id="goLogin">

Login

</span>

</p>


</div>

<div id="loginForm" class="form">

<h2>Login</h2>

<input
type="email"
placeholder="Email">

<input
type="password"
placeholder="Password">

<button>Submit</button>

<p>
Don't have an account?
<span id="goSignup">
Sign Up
</span>

</p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
