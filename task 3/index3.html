<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="index3.css">
</head>
<body>
<div class="page">
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="keys">
            <button data-action="clear" class="action">C</button>
            <button data-action="delete" class="action">DEL</button>
            <button data-action="percent" class="action">%</button>
            <button data-operator="divide" class="operator">÷</button>

            <button data-number="7">7</button>
            <button data-number="8">8</button>
            <button data-number="9">9</button>
            <button data-operator="multiply" class="operator">×</button>

            <button data-number="4">4</button>
            <button data-number="5">5</button>
            <button data-number="6">6</button>
            <button data-operator="subtract" class="operator">−</button>

            <button data-number="1">1</button>
            <button data-number="2">2</button>
            <button data-number="3">3</button>
            <button data-operator="add" class="operator">+</button>

            <button data-number="0" class="span-2">0</button>
            <button data-action="decimal">.</button>
            <button data-action="equals" class="equals">=</button>
        </div>
    </div>
</div>
<script src="main10.js"></script>
</body>
</html>
